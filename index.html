<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Quds - نظام الكشافة المطور</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1b5e20; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0; }
        .container { background-color: rgba(0, 0, 0, 0.85); padding: 25px; border-radius: 15px; text-align: center; width: 95%; max-width: 1000px; backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.1); }
        .screen { display: none; }
        .active { display: block; }
        button { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; background-color: #ffffff; color: #1b5e20; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #e0e0e0; transform: scale(1.01); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; color: black; font-size: 1rem; }
        .dev-link { background: none; color: #81c784; text-decoration: underline; font-size: 0.85rem; margin-top: 20px; cursor: pointer; border: none; }
        
        /* تحسينات الجدول */
        .admin-table-wrapper { max-height: 500px; overflow: auto; margin-top: 15px; background: white; border-radius: 8px; }
        table { width: 100%; min-width: 850px; color: #222; border-collapse: collapse; font-size: 0.9rem; }
        th, td { border: 1px solid #ddd; padding: 12px 8px; text-align: center; }
        th { background: #eee; position: sticky; top: 0; z-index: 10; color: #1b5e20; }
        tr:hover { background-color: #f1f1f1; }
        
        .delete-btn { background-color: #ff5252 !important; color: white !important; width: auto !important; display: inline-block; padding: 5px 15px; margin: 0; font-size: 0.8rem; border-radius: 5px; }
        .delete-btn:hover { background-color: #b71c1c !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen1" class="screen active">
        <h1>Al Quds Scout</h1>
        <p style="color: #ffd700;">نظام التسجيل المركزي - لوحة التحكم</p>
        <button onclick="openRegister('براعم')">براعم</button>
        <button onclick="openRegister('أشبال')">أشبال</button>
        <button onclick="openRegister('زهرات')">زهرات</button>
        <button onclick="openRegister('كشافة')">كشافة</button>
        <button onclick="openRegister('مرشدات')">مرشدات</button>
        <button onclick="openRegister('جوالة')">جوالة</button>
        <button class="dev-link" onclick="showView('screenLogin')">دخول الإدارة</button>
    </div>

    <div id="screenLogin" class="screen">
        <h3>تسجيل دخول الإدارة</h3>
        <input type="text" id="userIn" placeholder="اسم المستخدم">
        <input type="password" id="passIn" placeholder="كلمة المرور">
        <button onclick="checkDev()">دخول</button>
        <button onclick="showView('screen1')" style="background:#555; color:white">رجوع</button>
    </div>

    <div id="screenAdmin" class="screen">
        <h3 style="color:#ffd700">إدارة المشتركين</h3>
        <div class="admin-table-wrapper" id="adminTable">جاري جلب البيانات...</div>
        <button onclick="showView('screen1')" style="background:#333; color:white; margin-top:15px">خروج</button>
    </div>

    <div id="screenReg" class="screen">
        <h3 id="regTitle" style="color:#ffd700">تسجيل جديد</h3>
        <input type="text" id="regName" placeholder="الاسم ثلاثي">
        <input type="tel" id="regPhone" placeholder="رقم الهاتف الشخصي">
        <input type="tel" id="regWhatsApp" placeholder="رقم الواتساب">
        <input type="tel" id="regParentPhone" placeholder="رقم ولي الأمر">
        <input type="text" id="regAddress" placeholder="العنوان بالتفصيل">
        <input type="text" id="regSchool" placeholder="السنة الدراسية">
        <input type="hidden" id="selectedStage">
        <button id="saveBtn" onclick="finishReg()">إرسال البيانات للسحابة</button>
        <button onclick="showView('screen1')" style="background:#555; color:white">إلغاء</button>
    </div>

    <div id="screenSuccess" class="screen">
        <h2 style="color:#81c784">تم الحفظ بنجاح!</h2>
        <button onclick="location.reload()">تسجيل فرد آخر</button>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBKfHcBDQCdhnaWfVwi5f3YqzZu6fLOmUY",
        authDomain: "al-qyds-scout.firebaseapp.com",
        projectId: "al-qyds-scout",
        storageBucket: "al-qyds-scout.firebasestorage.app",
        messagingSenderId: "1043767699741",
        appId: "1:1043767699741:web:54611db0f785bddac299f4",
        measurementId: "G-MH5ZE8LLZM",
        databaseURL: "https://al-qyds-scout-default-rtdb.firebaseio.com/" 
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openRegister(stage) {
        document.getElementById('selectedStage').value = stage;
        document.getElementById('regTitle').innerText = "تسجيل: " + stage;
        showView('screenReg');
    }

    // وظيفة الإرسال
    function finishReg() {
        const name = document.getElementById('regName').value;
        const phone = document.getElementById('regPhone').value;
        const whatsapp = document.getElementById('regWhatsApp').value;
        const parent = document.getElementById('regParentPhone').value;
        const address = document.getElementById('regAddress').value;
        const school = document.getElementById('regSchool').value;
        const stage = document.getElementById('selectedStage').value;

        if(!name || !phone) { alert("يرجى كتابة الاسم ورقم الهاتف على الأقل"); return; }

        const data = {
            name: name,
            phone: phone,
            whatsapp: whatsapp,
            parentPhone: parent,
            address: address,
            schoolYear: school,
            stage: stage,
            time: new Date().toLocaleString('ar-EG')
        };

        document.getElementById('saveBtn').innerText = "جاري الإرسال...";
        database.ref('scouts').push(data).then(() => {
            showView('screenSuccess');
        }).catch(err => alert("حدث خطأ: " + err.message));
    }

    function checkDev() {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        if(u === "Ahmedmada_90" && p === "o90po90p") {
            loadCloudData();
            showView('screenAdmin');
        } else {
            alert("بيانات الدخول خاطئة");
        }
    }

    // وظيفة عرض البيانات (مصححة بنسبة 100%)
    function loadCloudData() {
        database.ref('scouts').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('adminTable');
            
            if(!data) {
                container.innerHTML = "<p style='color:black; padding:20px;'>لا توجد بيانات حالياً.</p>";
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>المرحلة</th>
                        <th>الهاتف</th>
                        <th>واتساب</th>
                        <th>ولي الأمر</th>
                        <th>العنوان</th>
                        <th>الدراسة</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody>`;

            for(let id in data) {
                const item = data[id];
                html += `<tr>
                    <td>${item.name || '-'}</td>
                    <td>${item.stage || '-'}</td>
                    <td>${item.phone || '-'}</td>
                    <td>${item.whatsapp || '-'}</td>
                    <td>${item.parentPhone || '-'}</td>
                    <td>${item.address || '-'}</td>
                    <td>${item.schoolYear || '-'}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteUser('${id}', '${item.name}')">حذف</button>
                    </td>
                </tr>`;
            }
            html += "</tbody></table>";
            container.innerHTML = html;
        });
    }

    function deleteUser(userId, userName) {
        if(confirm(`هل تريد بالتأكيد حذف الحساب الخاص بـ: ${userName}؟`)) {
            database.ref('scouts/' + userId).remove()
            .then(() => alert("تم الحذف بنجاح"))
            .catch(err => alert("خطأ أثناء الحذف: " + err.message));
        }
    }
</script>

</body>
</html>
