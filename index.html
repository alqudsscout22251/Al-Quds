<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Quds Scout - لوحة التحكم</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1b5e20; color: white; margin: 0; padding: 10px; min-height: 100vh; }
        .container { background-color: rgba(0, 0, 0, 0.9); padding: 20px; border-radius: 15px; text-align: center; width: calc(100% - 40px); max-width: 1300px; margin: auto; border: 1px solid rgba(255,255,255,0.1); }
        .screen { display: none; }
        .active { display: block; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; padding: 12px; margin: 5px 0; width: 100%; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        
        /* تصميم الجدول الاحترافي */
        .table-container { width: 100%; overflow-x: auto; background: white; border-radius: 10px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; color: #333; min-width: 1100px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background: #eee; color: #1b5e20; position: sticky; top: 0; }
        
        /* زر الحذف المختفي */
        .del-col { display: none; }
        .del-btn { background: #d32f2f; color: white; padding: 5px; font-size: 0.8rem; width: auto; }

        .admin-footer { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #toggleDel { background: #ffd700; color: black; max-width: 300px; }
        #exitBtn { background: #555; color: white; max-width: 200px; }
    </style>
</head>
<body>

<div class="container">
    <div id="screenHome" class="screen active">
        <h1>Al Quds Scout</h1>
        <button style="background:white; color:#1b5e20;" onclick="goReg('براعم')">براعم</button>
        <button style="background:white; color:#1b5e20;" onclick="goReg('أشبال')">أشبال</button>
        <button style="background:white; color:#1b5e20;" onclick="goReg('زهرات')">زهرات</button>
        <button style="background:white; color:#1b5e20;" onclick="goReg('كشافة')">كشافة</button>
        <button style="background:white; color:#1b5e20;" onclick="goReg('مرشدات')">مرشدات</button>
        <button style="background:white; color:#1b5e20;" onclick="goReg('جوالة')">جوالة</button>
        <p onclick="showV('screenLogin')" style="text-decoration:underline; cursor:pointer; color:#81c784; margin-top:20px;">دخول الإدارة</p>
    </div>

    <div id="screenAdmin" class="screen">
        <h2 style="color:#ffd700;">سجل البيانات السحابي</h2>
        <div class="table-container" id="dataTable">جاري التحميل...</div>
        <div class="admin-footer">
            <button id="toggleDel" onclick="toggleDel()">تفعيل خاصية الحذف 🗑️</button>
            <button id="exitBtn" onclick="location.reload()">خروج</button>
        </div>
    </div>

    <div id="screenLogin" class="screen">
        <h3>أدخل بيانات الإدارة</h3>
        <input type="text" id="u" placeholder="المستخدم">
        <input type="password" id="p" placeholder="الرمز">
        <button onclick="login()" style="background:#ffd700;">دخول</button>
        <button onclick="showV('screenHome')" style="background:none; color:white;">إلغاء</button>
    </div>

    <div id="screenForm" class="screen">
        <h3 id="stageTitle">تسجيل</h3>
        <input type="text" id="n" placeholder="الاسم ثلاثي">
        <input type="tel" id="ph" placeholder="الهاتف">
        <input type="tel" id="w" placeholder="واتساب">
        <input type="tel" id="pp" placeholder="ولي الأمر">
        <input type="text" id="ad" placeholder="العنوان">
        <input type="text" id="sy" placeholder="السنة الدراسية">
        <input type="hidden" id="stg">
        <button onclick="sendData()" style="background:#ffd700;">إرسال للسيرفر</button>
        <button onclick="showV('screenHome')" style="background:none; color:white;">رجوع</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKfHcBDQCdhnaWfVwi5f3YqzZu6fLOmUY",
        authDomain: "al-qyds-scout.firebaseapp.com",
        projectId: "al-qyds-scout",
        storageBucket: "al-qyds-scout.firebasestorage.app",
        messagingSenderId: "1043767699741",
        appId: "1:1043767699741:web:54611db0f785bddac299f4",
        measurementId: "G-MH5ZE8LLZM",
        databaseURL: "https://al-qyds-scout-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let canDel = false;

    function showV(id){
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goReg(s){
        document.getElementById('stg').value = s;
        document.getElementById('stageTitle').innerText = "تسجيل: " + s;
        showV('screenForm');
    }

    function sendData(){
        const obj = {
            name: document.getElementById('n').value,
            p1: document.getElementById('ph').value,
            p2: document.getElementById('w').value,
            p3: document.getElementById('pp').value,
            addr: document.getElementById('ad').value,
            year: document.getElementById('sy').value,
            stage: document.getElementById('stg').value,
            time: new Date().toLocaleString('ar-EG')
        };
        db.ref('scouts').push(obj).then(() => { alert("تم الحفظ"); location.reload(); });
    }

    function login(){
        if(document.getElementById('u').value === "Ahmedmada_90" && document.getElementById('p').value === "o90po90p"){
            getData(); showV('screenAdmin');
        } else { alert("خطأ"); }
    }

    function getData(){
        db.ref('scouts').on('value', (snap) => {
            const val = snap.val();
            if(!val){ document.getElementById('dataTable').innerHTML = "لا بيانات"; return; }
            let h = <table><tr><th>الاسم</th><th>المرحلة</th><th>هاتف</th><th>واتس</th><th>ولي أمر</th><th>عنوان</th><th>سنة</th><th class="del-col">إجراء</th></tr>;
            for(let k in val){
                h += <tr><td>${val[k].name}</td><td>${val[k].stage}</td><td>${val[k].p1}</td><td>${val[k].p2}</td><td>${val[k].p3}</td><td>${val[k].addr}</td><td>${val[k].year}</td><td class="del-col"><button class="del-btn" onclick="del('${k}')">حذف</button></td></tr>;
            }
            document.getElementById('dataTable').innerHTML = h + "</table>";
            if(canDel) updateDel();
        });
    }

    function toggleDel(){
        canDel = !canDel;
        document.getElementById('toggleDel').innerText = canDel ? "إغلاق الحذف 🔓" : "تفعيل خاصية الحذف 🗑️";
        updateDel();
    }

    function updateDel(){
        document.querySelectorAll('.del-col').forEach(c => c.style.display = canDel ? "table-cell" : "none");
    }

    function del(id){
        if(confirm("مسح؟")){ db.ref('scouts/'+id).remove(); }
    }
</script>
</body>
</html>
