<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Quds - نظام الكشافة المطور</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1b5e20;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            width: 95%;
            max-width: 600px;
            backdrop-filter: blur(10px);
            position: relative;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .points-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ffd700;
            color: #000;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }

        .screen { display: none; }
        .active { display: block; }

        button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background-color: #ffffff;
            color: #1b5e20;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: #e0e0e0; }

        .dev-link {
            background: none;
            color: #81c784;
            text-decoration: underline;
            font-size: 0.85rem;
            margin-top: 20px;
            cursor: pointer;
            border: none;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .admin-table-wrapper {
            max-height: 400px;
            overflow-x: auto;
            overflow-y: auto;
            margin-top: 15px;
            background: white;
            border-radius: 5px;
        }

        table {
            width: 150%; /* عرض أكبر لاستيعاب البيانات الكثيرة */
            color: black;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #eee; font-weight: bold; position: sticky; top: 0; }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 10px;
        }
        label { display: block; text-align: right; margin-top: 5px; font-size: 0.9rem; color: #ffd700; }
    </style>
</head>
<body>

<div class="container">
    <div id="mainPoints" class="points-badge">النقاط: 0</div>

    <div id="screen1" class="screen active">
        <h1>Al Quds</h1>
        <p>اختر المرحلة ا</p>
        <button onclick="openRegister('براعم')">1- براعم</button>
        <button onclick="openRegister('أشبال')">2- أشبال</button>
        <button onclick="openRegister('زهرات')">3- زهرات</button>
        <button onclick="openRegister('كشافة')">4- كشافة</button>
        <button onclick="openRegister('مرشدات')">5- مرشدات</button>
        <button onclick="openRegister('جوالة')">6- جوالة</button>
        <button onclick="openRegister('جوالات')">7- جوالات</button>
        <button class="dev-link" onclick="showView('screenLogin')">خيارات المطور</button>
    </div>

    <div id="screenLogin" class="screen">
        <h3>دخول المطور</h3>
        <input type="text" id="userIn" placeholder="اسم المستخدم">
        <input type="password" id="passIn" placeholder="كلمة المرور">
        <button onclick="checkDev()">دخول</button>
        <button onclick="showView('screen1')" style="background:#555; color:white">رجوع</button>
    </div>

    <div id="screenAdmin" class="screen">
        <h3>بيانات المشتركين كاملة</h3>
        <div class="admin-table-wrapper" id="adminTable"></div>
        <button onclick="clearAllData()" style="background:#b71c1c; color:white; font-size:0.8rem; margin-top:10px;">حذف كل السجلات</button>
        <button onclick="showView('screen1')" style="background:#333; color:white; margin-top:10px">خروج</button>
    </div>

    <div id="screenReg" class="screen">
        <h3 id="regTitle">تسجيل جديد</h3>
        
        <input type="text" id="regName" placeholder="الاسم ثلاثي">
        <input type="text" id="regAddress" placeholder="العنوان بالتفصيل">
        <input type="tel" id="regPhone" placeholder="رقم الهاتف">
        <input type="tel" id="regWhatsapp" placeholder="رقم الواتساب">
        <input type="tel" id="regParentPhone" placeholder="رقم ولي الأمر">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني (Gmail)">
        
        <label>تاريخ الميلاد:</label>
        <input type="date" id="regBirth">
        
        <input type="text" id="regSchoolYear" placeholder="السنة الدراسية">
        
        <input type="hidden" id="selectedStage">

        <button onclick="finishReg()">حفظ البيانات ودخول</button>
        <button onclick="showView('screen1')" style="background:#555; color:white">إلغاء</button>
    </div>

    <div id="screenActivities" class="screen">
        <h3 style="color:#ffd700">تم التسجيل بنجاح!</h3>
        <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px; margin-bottom:15px;">
            <p>📍 تنظيم لجان المهرجان الـ 37</p>
            <p>مرحباً بك في أسرة القدس الكشفية</p>
        </div>
        <button onclick="location.reload()" style="background:#81c784; color:black">تسجيل فرد آخر</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('alquds_users')) || [];
    let currentIdx = -1;

    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openRegister(stage) {
        document.getElementById('selectedStage').value = stage;
        document.getElementById('regTitle').innerText = "تسجيل في مرحلة: " + stage;
        showView('screenReg');
    }

    function finishReg() {
        const data = {
            name: document.getElementById('regName').value,
            address: document.getElementById('regAddress').value,
            phone: document.getElementById('regPhone').value,
            whatsapp: document.getElementById('regWhatsapp').value,
            parentPhone: document.getElementById('regParentPhone').value,
            email: document.getElementById('regEmail').value,
            birth: document.getElementById('regBirth').value,
            schoolYear: document.getElementById('regSchoolYear').value,
            stage: document.getElementById('selectedStage').value,
            pts: 0,
            regDate: new Date().toLocaleDateString('ar-EG')
        };

        if(!data.name || !data.phone || !data.stage) { 
            alert("من فضلك أكمل البيانات الأساسية (الاسم، الهاتف، المرحلة)"); 
            return; 
        }
        
        db.push(data);
        localStorage.setItem('alquds_users', JSON.stringify(db));
        
        currentIdx = db.length - 1;
        updatePointsUI();
        document.getElementById('mainPoints').style.display = 'block';
        showView('screenActivities');
    }

    function checkDev() {
        let u = document.getElementById('userIn').value;
        let p = document.getElementById('passIn').value;
        
        if(u === "Ahmedmada_90" && p === "o90po90p") {
            loadAdminTable();
            showView('screenAdmin');
        } else {
            alert("خطأ في بيانات المطور!");
        }
    }

    function loadAdminTable() {
        let html = `<table>
            <tr>
                <th>الاسم</th>
                <th>المرحلة</th>
                <th>السنة الدراسية</th>
                <th>الهاتف</th>
                <th>واتساب</th>
                <th>ولي الأمر</th>
                <th>العنوان</th>
                <th>الميلاد</th>
                <th>النقاط</th>
                <th>تحكم</th>
            </tr>`;
            
        db.forEach((item, index) => {
            html += `<tr>
                <td>${item.name}</td>
                <td>${item.stage}</td>
                <td>${item.schoolYear}</td>
                <td>${item.phone}</td>
                <td>${item.whatsapp}</td>
                <td>${item.parentPhone}</td>
                <td>${item.address}</td>
                <td>${item.birth}</td>
                <td><b>${item.pts}</b></td>
                <td><button onclick="addPts(${index})" style="padding:5px; margin:0; font-size:10px; background:#ffd700; color:#000">+5</button></td>
            </tr>`;
        });
        
        html += "</table>";
        document.getElementById('adminTable').innerHTML = (db.length > 0) ? html : "<p style='color:black; padding:10px;'>لا يوجد مشتركين حالياً</p>";
    }

    function addPts(idx) {
        db[idx].pts += 5;
        localStorage.setItem('alquds_users', JSON.stringify(db));
        loadAdminTable();
        updatePointsUI();
    }

    function updatePointsUI() {
        if(currentIdx !== -1) {
            document.getElementById('mainPoints').innerText = "النقاط: " + db[currentIdx].pts;
        }
    }

    function clearAllData() {
        if(confirm("هل أنت متأكد من مسح جميع البيانات؟ لا يمكن التراجع!")) {
            localStorage.removeItem('alquds_users');
            db = [];
            loadAdminTable();
        }
    }
</script>

</body>
</html>
