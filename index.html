<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Quds - نظام الكشافة السحابي</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1b5e20; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0; }
        .container { background-color: rgba(0, 0, 0, 0.8); padding: 25px; border-radius: 15px; text-align: center; width: 95%; max-width: 600px; backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.1); position: relative; }
        .screen { display: none; }
        .active { display: block; }
        button { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; background-color: #ffffff; color: #1b5e20; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #e0e0e0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; color: black; }
        .dev-link { background: none; color: #81c784; text-decoration: underline; font-size: 0.85rem; margin-top: 20px; cursor: pointer; border: none; }
        .admin-table-wrapper { max-height: 400px; overflow: auto; margin-top: 15px; background: white; border-radius: 5px; }
        table { width: 100%; min-width: 600px; color: black; border-collapse: collapse; font-size: 0.8rem; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #eee; position: sticky; top: 0; }
        .footer { margin-top: 20px; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen1" class="screen active">
        <h1>Al Quds Scout</h1>
        <p>نظام التسجيل المركزي</p>
        <button onclick="openRegister('براعم')">براعم</button>
        <button onclick="openRegister('أشبال')">أشبال</button>
        <button onclick="openRegister('زهرات')">زهرات</button>
        <button onclick="openRegister('كشافة')">كشافة</button>
        <button onclick="openRegister('مرشدات')">مرشدات</button>
        <button onclick="openRegister('جوالة')">جوالة</button>
        <button class="dev-link" onclick="showView('screenLogin')">لوحة تحكم المطور</button>
    </div>

    <div id="screenLogin" class="screen">
        <h3>دخول الإدارة</h3>
        <input type="text" id="userIn" placeholder="اسم المستخدم">
        <input type="password" id="passIn" placeholder="كلمة المرور">
        <button onclick="checkDev()">دخول</button>
        <button onclick="showView('screen1')" style="background:#555; color:white">رجوع</button>
    </div>

    <div id="screenAdmin" class="screen">
        <h3 style="color:#ffd700">جميع المسجلين في السحابة</h3>
        <div class="admin-table-wrapper" id="adminTable">جاري جلب البيانات...</div>
        <button onclick="showView('screen1')" style="background:#333; color:white; margin-top:10px">خروج</button>
    </div>

    <div id="screenReg" class="screen">
        <h3 id="regTitle">تسجيل جديد</h3>
        <input type="text" id="regName" placeholder="الاسم ثلاثي">
        <input type="tel" id="regPhone" placeholder="رقم الهاتف">
        <input type="text" id="regSchool" placeholder="السنة الدراسية">
        <input type="hidden" id="selectedStage">
        <button id="saveBtn" onclick="finishReg()">حفظ البيانات سحابياً</button>
        <button onclick="showView('screen1')" style="background:#555; color:white">إلغاء</button>
    </div>

    <div id="screenSuccess" class="screen">
        <h2 style="color:#81c784">تم الحفظ بنجاح!</h2>
        <p>بياناتك أصبحت الآن في سجلات الكشافة المركزية.</p>
        <button onclick="location.reload()">تسجيل فرد آخر</button>
        <div class="footer">نظام القدس المطور 2026</div>
    </div>
</div>

<script>
    // بيانات Firebase الخاصة بمشروعك (المأخوذة من الصورة)
    const firebaseConfig = {
        apiKey: "AIzaSyBKfHcBDQCdhnaWfVwi5f3YqzZu6fLOmUY",
        authDomain: "al-qyds-scout.firebaseapp.com",
        projectId: "al-qyds-scout",
        storageBucket: "al-qyds-scout.firebasestorage.app",
        messagingSenderId: "1043767699741",
        appId: "1:1043767699741:web:54611db0f785bddac299f4",
        measurementId: "G-MH5ZE8LLZM",
        databaseURL: "https://al-qyds-scout-default-rtdb.firebaseio.com/" 
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openRegister(stage) {
        document.getElementById('selectedStage').value = stage;
        document.getElementById('regTitle').innerText = "تسجيل: " + stage;
        showView('screenReg');
    }

    // وظيفة حفظ البيانات في السحابة
    function finishReg() {
        const name = document.getElementById('regName').value;
        const phone = document.getElementById('regPhone').value;
        const stage = document.getElementById('selectedStage').value;
        const school = document.getElementById('regSchool').value;

        if(!name || !phone) { alert("من فضلك أدخل الاسم والهاتف"); return; }

        document.getElementById('saveBtn').innerText = "جاري الحفظ في السيرفر...";
        document.getElementById('saveBtn').disabled = true;

        const newUserRef = database.ref('scouts').push();
        newUserRef.set({
            name: name,
            phone: phone,
            stage: stage,
            schoolYear: school,
            regDate: new Date().toLocaleString('ar-EG'),
            points: 0
        }).then(() => {
            showView('screenSuccess');
        }).catch(err => {
            alert("خطأ في الاتصال بالسحابة: " + err.message);
            document.getElementById('saveBtn').innerText = "حفظ البيانات سحابياً";
            document.getElementById('saveBtn').disabled = false;
        });
    }

    function checkDev() {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        if(u === "Ahmedmada_90" && p === "o90po90p") {
            loadCloudData();
            showView('screenAdmin');
        } else {
            alert("بيانات المطور غير صحيحة");
        }
    }

    // وظيفة جلب البيانات من السحابة وعرضها لك
    function loadCloudData() {
        database.ref('scouts').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) {
                document.getElementById('adminTable').innerHTML = "<p style='color:black; padding:20px;'>لا يوجد مشتركين مسجلين بعد.</p>";
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>المرحلة</th>
                        <th>الهاتف</th>
                        <th>التاريخ</th>
                    </tr>
                </thead>
                <tbody>`;

            for(let id in data) {
                html += `<tr>
                    <td>${data[id].name}</td>
                    <td>${data[id].stage}</td>
                    <td>${data[id].phone}</td>
                    <td>${data[id].regDate}</td>
                </tr>`;
            }
            html += "</tbody></table>";
            document.getElementById('adminTable').innerHTML = html;
        });
    }
</script>

</body>
</html>
