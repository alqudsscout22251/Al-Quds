<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Quds - نظام الكشافة المطور</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1b5e20;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            position: relative;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .points-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ffd700;
            color: #000;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }

        .screen { display: none; }
        .active { display: block; }

        button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background-color: #ffffff;
            color: #1b5e20;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: #e0e0e0; }

        .dev-link {
            background: none;
            color: #81c784;
            text-decoration: underline;
            font-size: 0.85rem;
            margin-top: 20px;
            cursor: pointer;
            border: none;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .admin-table-wrapper {
            max-height: 250px;
            overflow-y: auto;
            margin-top: 15px;
            background: white;
            border-radius: 5px;
        }

        table {
            width: 100%;
            color: black;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #eee; }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="mainPoints" class="points-badge">النقاط: 0</div>

    <div id="screen1" class="screen active">
        <h1>Al Quds</h1>
        <button onclick="openRegister('أشبال')">1- أشبال</button>
        <button onclick="openRegister('زهرات')">2- زهرات</button>
        <button onclick="openRegister('كشافة')">3- كشافة</button>
        <button onclick="openRegister('مرشدات')">4- مرشدات</button>
        <button class="dev-link" onclick="showView('screenLogin')">خيارات المطور</button>
    </div>

    <div id="screenLogin" class="screen">
        <h3>دخول المطور</h3>
        <input type="text" id="userIn" placeholder="اسم المستخدم">
        <input type="password" id="passIn" placeholder="كلمة المرور">
        <button onclick="checkDev()">دخول</button>
        <button onclick="showView('screen1')" style="background:#555; color:white">رجوع</button>
    </div>

    <div id="screenAdmin" class="screen">
        <h3>قائمة المشتركين المحفوظة</h3>
        <div class="admin-table-wrapper" id="adminTable"></div>
        <button onclick="clearAllData()" style="background:#b71c1c; color:white; font-size:0.7rem; margin-top:10px;">حذف كل البيانات</button>
        <button onclick="showView('screen1')" style="background:#333; color:white; margin-top:10px">خروج</button>
    </div>

    <div id="screenReg" class="screen">
        <h3>تسجيل جديد</h3>
        <input type="text" id="regName" placeholder="الاسم ثلاثي">
        <input type="date" id="regBirth">
        <input type="number" id="regId" placeholder="الرقم القومي">
        <button onclick="finishReg()">حفظ ودخول</button>
        <button onclick="showView('screen1')" style="background:#555; color:white">إلغاء</button>
    </div>

    <div id="screenActivities" class="screen">
        <h3>الأنشطة المتاحة</h3>
        <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px; margin-bottom:15px;">
            <p>📍 تنظيم لجان المهرجان الـ 37</p>
        </div>
        <div class="footer">الدعم الفني: 01204790130</div>
    </div>
</div>

<script>
    // تحميل البيانات من ذاكرة المتصفح عند فتح الصفحة
    let db = JSON.parse(localStorage.getItem('alquds_users')) || [];
    let currentIdx = -1;

    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openRegister(stage) {
        showView('screenReg');
    }

    // حفظ المستخدم في الـ LocalStorage
    function finishReg() {
        let n = document.getElementById('regName').value;
        let b = document.getElementById('regBirth').value;
        let idVal = document.getElementById('regId').value;

        if(!n || !b || !idVal) { alert("من فضلك أكمل البيانات"); return; }
        
        let user = { name: n, birth: b, nationalId: idVal, pts: 0 };
        db.push(user);
        
        // حفظ القائمة المحدثة في الجهاز
        localStorage.setItem('alquds_users', JSON.stringify(db));
        
        currentIdx = db.length - 1;
        updatePointsUI();
        document.getElementById('mainPoints').style.display = 'block';
        showView('screenActivities');
    }

    function checkDev() {
        let u = document.getElementById('userIn').value;
        let p = document.getElementById('passIn').value;
        
        if(u === "Ahmedmada_90" && p === "o90po90p") {
            loadAdminTable();
            showView('screenAdmin');
        } else {
            alert("خطأ في البيانات!");
        }
    }

    function loadAdminTable() {
        let html = "<table><tr><th>الاسم</th><th>نقاط</th><th>إجراء</th></tr>";
        db.forEach((item, index) => {
            html += `<tr>
                <td>${item.name}</td>
                <td>${item.pts}</td>
                <td><button onclick="addPts(${index})" style="padding:2px 5px; margin:0; font-size:11px; width:auto; display:inline-block;">+5</button></td>
            </tr>`;
        });
        html += "</table>";
        document.getElementById('adminTable').innerHTML = (db.length > 0) ? html : "<p style='color:black; padding:10px;'>لا يوجد مشتركين</p>";
    }

    function addPts(idx) {
        db[idx].pts += 5;
        localStorage.setItem('alquds_users', JSON.stringify(db)); // حفظ التعديل
        loadAdminTable();
        updatePointsUI();
    }

    function updatePointsUI() {
        if(currentIdx !== -1) {
            document.getElementById('mainPoints').innerText = "النقاط: " + db[currentIdx].pts;
        }
    }

    // وظيفة إضافية لمسح كل المسجلين
    function clearAllData() {
        if(confirm("هل أنت متأكد من حذف جميع بيانات المسجلين؟")) {
            localStorage.removeItem('alquds_users');
            db = [];
            loadAdminTable();
        }
    }
</script>

</body>
</html>
