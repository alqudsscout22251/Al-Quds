<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Quds Scout - نظام الإدارة النهائي</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: sans-serif; background-color: #1b5e20; color: white; margin: 0; padding: 10px; direction: rtl; }
        .container { background: rgba(0,0,0,0.9); padding: 15px; border-radius: 15px; max-width: 1300px; margin: auto; text-align: center; }
        .screen { display: none; }
        .active { display: block; }
        
        /* تحسين شكل الزراير عشان تستجيب فوراً */
        button { cursor: pointer; border-radius: 8px; border: none; padding: 15px; margin: 8px 0; width: 100%; font-weight: bold; font-size: 1.1rem; }
        .main-btn { background: white; color: #1b5e20; }
        .action-btn { background: #ffd700; color: black; }
        .exit-btn { background: #444; color: white; }
        .del-btn { background: #ff5252; color: white; padding: 5px; font-size: 0.8rem; width: auto; }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 1rem; color: black; }
        
        .table-wrapper { width: 100%; overflow-x: auto; background: white; border-radius: 10px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; color: #333; min-width: 1000px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background: #f4f4f4; color: #1b5e20; }

        .del-col { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="home" class="screen active">
        <h1>Al Quds Scout</h1>
        <button class="main-btn" onclick="openReg('براعم')">براعم</button>
        <button class="main-btn" onclick="openReg('أشبال')">أشبال</button>
        <button class="main-btn" onclick="openReg('زهرات')">زهرات</button>
        <button class="main-btn" onclick="openReg('كشافة')">كشافة</button>
        <button class="main-btn" onclick="openReg('مرشدات')">مرشدات</button>
        <button class="main-btn" onclick="openReg('جوالة')">جوالة</button>
        <p onclick="showScreen('login')" style="text-decoration:underline; cursor:pointer; color:#81c784; margin-top:20px;">دخول الإدارة</p>
    </div>

    <div id="form" class="screen">
        <h3 id="formTitle">تسجيل</h3>
        <input type="text" id="name" placeholder="الاسم ثلاثي">
        <input type="tel" id="p1" placeholder="رقم الهاتف">
        <input type="tel" id="p2" placeholder="واتساب">
        <input type="tel" id="p3" placeholder="رقم ولي الأمر">
        <input type="text" id="addr" placeholder="العنوان">
        <input type="text" id="year" placeholder="السنة الدراسية">
        <input type="hidden" id="stage">
        <button class="action-btn" onclick="saveToFirebase()">حفظ البيانات</button>
        <button class="exit-btn" onclick="showScreen('home')">رجوع</button>
    </div>

    <div id="login" class="screen">
        <h3>أدخل بيانات المدير</h3>
        <input type="text" id="u" placeholder="المستخدم">
        <input type="password" id="p" placeholder="كلمة المرور">
        <button class="action-btn" onclick="loginCheck()">دخول</button>
        <button class="exit-btn" onclick="showScreen('home')">إلغاء</button>
    </div>

    <div id="admin" class="screen">
        <h2 style="color:#ffd700">سجل المشتركين</h2>
        <div class="table-wrapper" id="tableContent">جاري التحميل...</div>
        <div style="margin-top:20px;">
            <button id="delToggle" class="action-btn" style="width:250px" onclick="toggleDel()">تفعيل الحذف 🗑️</button>
            <button class="exit-btn" style="width:250px" onclick="location.reload()">خروج نهائي</button>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const config = {
        apiKey: "AIzaSyBKfHcBDQCdhnaWfVwi5f3YqzZu6fLOmUY",
        authDomain: "al-qyds-scout.firebaseapp.com",
        projectId: "al-qyds-scout",
        storageBucket: "al-qyds-scout.firebasestorage.app",
        messagingSenderId: "1043767699741",
        appId: "1:1043767699741:web:54611db0f785bddac299f4",
        measurementId: "G-MH5ZE8LLZM",
        databaseURL: "https://al-qyds-scout-default-rtdb.firebaseio.com/" 
    };

    firebase.initializeApp(config);
    const db = firebase.database();
    let deleteMode = false;

    // وظيفة التنقل بين الشاشات
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    // فتح نموذج التسجيل
    function openReg(s) {
        document.getElementById('stage').value = s;
        document.getElementById('formTitle').innerText = "مرحلة: " + s;
        showScreen('form');
    }

    // حفظ البيانات
    function saveToFirebase() {
        const data = {
            name: document.getElementById('name').value,
            phone: document.getElementById('p1').value,
            whatsapp: document.getElementById('p2').value,
            parent: document.getElementById('p3').value,
            address: document.getElementById('addr').value,
            school: document.getElementById('year').value,
            stage: document.getElementById('stage').value,
            time: new Date().toLocaleString('ar-EG')
        };
        
        if(!data.name || !data.phone) { alert("أكمل الاسم والهاتف"); return; }
        
        db.ref('scouts').push(data).then(() => {
            alert("تم التسجيل بنجاح");
            location.reload();
        });
    }

    // تسجيل دخول الإدارة
    function loginCheck() {
        if(document.getElementById('u').value === "Ahmedmada_90" && document.getElementById('p').value === "o90po90p") {
            loadAdminData();
            showScreen('admin');
        } else {
            alert("بيانات خاطئة");
        }
    }

    // تحميل وعرض البيانات
    function loadAdminData() {
        db.ref('scouts').on('value', (snap) => {
            const list = snap.val();
            if(!list) {
                document.getElementById('tableContent').innerHTML = "<p style='color:black; padding:20px;'>لا يوجد بيانات</p>";
                return;
            }

            let table = `<table><tr>
                <th>الاسم</th><th>المرحلة</th><th>الهاتف</th><th>واتساب</th><th>ولي الأمر</th><th>العنوان</th><th>الدراسة</th>
                <th class="del-col">حذف</th>
            </tr>`;

            for(let key in list) {
                table += `<tr>
                    <td>${list[key].name}</td><td>${list[key].stage}</td><td>${list[key].phone}</td><td>${list[key].whatsapp}</td>
                    <td>${list[key].parent}</td><td>${list[key].address}</td><td>${list[key].school}</td>
                    <td class="del-col"><button class="del-btn" onclick="confirmDel('${key}')">مسح</button></td>
                </tr>`;
            }
            document.getElementById('tableContent').innerHTML = table + "</table>";
            refreshDelUI();
        });
    }

    // تفعيل وإخفاء الحذف
    function toggleDel() {
        deleteMode = !deleteMode;
        document.getElementById('delToggle').innerText = deleteMode ? "إيقاف الحذف 🔓" : "تفعيل الحذف 🗑️";
        refreshDelUI();
    }

    function refreshDelUI() {
        const cols = document.querySelectorAll('.del-col');
        cols.forEach(c => c.style.display = deleteMode ? "table-cell" : "none");
    }

    // حذف سجل
    function confirmDel(id) {
        if(confirm("هل تريد حذف هذا السجل نهائياً؟")) {
            db.ref('scouts/' + id).remove();
        }
    }
</script>

</body>
</html>
